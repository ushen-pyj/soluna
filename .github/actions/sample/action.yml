name: Build Sample WASM
description: Build sample.wasm side module for Soluna web runtime

inputs:
  soluna_path:
    description: "The path to the Soluna repository. Defaults to ."
    required: false
    default: "."
  emsdk_version:
    description: "Emscripten SDK version."
    required: false
    default: "4.0.17"

outputs:
  SAMPLE_WASM_PATH:
    description: "The path to built sample.wasm side module."
    value: ${{ steps.set-output.outputs.SAMPLE_WASM_PATH }}

runs:
  using: "composite"
  steps:
    - name: Get the soluna commit
      id: refs
      working-directory: ${{ inputs.soluna_path }}
      shell: bash
      run: |
        echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

    - name: Cache sample wasm build
      uses: actions/cache@v6
      id: cache
      with:
        path: |
          ${{ inputs.soluna_path }}/bin
          ${{ inputs.soluna_path }}/build
        key: ${{ runner.os }}-sample-wasm-${{ steps.refs.outputs.commit }}-${{ inputs.emsdk_version }}

    - name: Checkout all submodules
      if: steps.cache.outputs.cache-hit != 'true'
      working-directory: ${{ inputs.soluna_path }}
      shell: bash
      run: |
        git submodule update --init --recursive

    - name: Resolve LuaMake
      id: luamake
      if: runner.os == 'Linux' && steps.cache.outputs.cache-hit != 'true'
      working-directory: ${{ inputs.soluna_path }}
      shell: bash
      run: |
        case "$RUNNER_ARCH" in
          X64)
            luamake_platform=linux
            ;;
          ARM64)
            luamake_platform=linux_arm64
            ;;
          *)
            echo "Unsupported LuaMake runner: ${RUNNER_OS}-${RUNNER_ARCH}" >&2
            exit 1
            ;;
        esac

        luamake_path="bin/luamake-bin/bin/$luamake_platform/luamake"
        if [ ! -f "$luamake_path" ]; then
          echo "LuaMake binary not found: $luamake_path" >&2
          exit 1
        fi
        chmod +x "$luamake_path"
        echo "path=$luamake_path" >> "$GITHUB_OUTPUT"

    - name: Setup Emscripten
      if: runner.os == 'Linux' && steps.cache.outputs.cache-hit != 'true'
      uses: emscripten-core/setup-emsdk@v16
      with:
        version: ${{ inputs.emsdk_version }}
        actions-cache-folder: emsdk-cache

    - name: Build sample side module
      if: runner.os == 'Linux' && steps.cache.outputs.cache-hit != 'true'
      shell: bash
      working-directory: ${{ inputs.soluna_path }}
      run: |
        "${{ steps.luamake.outputs.path }}" -compiler emcc sample

    - name: Set output
      id: set-output
      shell: bash
      working-directory: ${{ inputs.soluna_path }}
      run: |
        soluna_root=$(pwd -P)
        SAMPLE_WASM_PATH=$(find "$soluna_root/bin" -name "sample.wasm" | head -n 1)
        if [ -z "$SAMPLE_WASM_PATH" ]; then
          echo "sample.wasm not found" >&2
          exit 1
        fi
        echo "SAMPLE_WASM_PATH=$SAMPLE_WASM_PATH" >> "$GITHUB_OUTPUT"
